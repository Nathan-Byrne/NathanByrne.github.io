		<div class="swirl swirl-2"></div>
		<div class="swirl swirl-3"></div>
		<div class="swirl swirl-4"></div>
		<div class="stars"></div>
		<div class="stars stars-2"></div>

		<svg class="wave-lines" viewBox="0 0 1000 500" preserveAspectRatio="none" aria-hidden="true">

		</svg>
	</div>

	<canvas id="fx-canvas" aria-hidden="true"></canvas>

	<div class="theme-swatches" role="group" aria-label="Background theme colour">
		<button class="theme-swatch active" type="button" data-color="#c48fd6" style="--sw:#c48fd6" aria-label="Lilac (default)"></button>
		<button class="theme-swatch" type="button" data-color="#e05f5f" style="--sw:#e05f5f" aria-label="Red"></button>
		<button class="theme-swatch" type="button" data-color="#5f8ee0" style="--sw:#5f8ee0" aria-label="Blue"></button>
		<button class="theme-swatch" type="button" data-color="#5fcf8e" style="--sw:#5fcf8e" aria-label="Green"></button>
		<button class="theme-swatch" type="button" data-color="#e0c95f" style="--sw:#e0c95f" aria-label="Yellow"></button>
		<button class="theme-swatch" type="button" data-color="#e0955f" style="--sw:#e0955f" aria-label="Orange"></button>
		<button class="theme-swatch" type="button" data-color="#5fd1c9" style="--sw:#5fd1c9" aria-label="Teal"></button>
		<button class="theme-swatch" type="button" data-color="#e05fc0" style="--sw:#e05fc0" aria-label="Magenta"></button>
	</div>

	<button class="mode-toggle" id="mode-toggle" type="button" aria-pressed="false">
		<span class="dot" aria-hidden="true"></span>
		<span id="mode-toggle-label">Simple mode</span>
	</button>

			<div class="header-top">
				<img class="pfp" src="assets/images/face.png" alt="Profile picture">

					<h1 class="site-title">Nathan Byrne</h1>
					<p class="site-tagline">A list of projects that I have created / contributed to.</p>
				</div>
			</div>
		</div>
